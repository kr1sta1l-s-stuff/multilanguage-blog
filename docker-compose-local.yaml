version: "3.8"

services:
  blog-db:
    container_name: "blog-db"
    image: mirror.gcr.io/library/postgres:17-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=blog-db
    ports:
      - "5439:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - blog-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  blog-redis:
    container_name: "blog-redis"
    image: mirror.gcr.io/library/redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    networks:
      - blog-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  blog-minio:
    container_name: "blog-minio"
    image: minio/minio
    command: server /data --console-address ":9001"
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - blog-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  blog-minio-init:
    container_name: "blog-minio-init"
    image: minio/mc
    depends_on:
      blog-minio:
        condition: service_healthy
    volumes:
      - ./minio-policy.json:/minio-policy.json
    networks:
      - blog-network
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://blog-minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/blog &&
        mc anonymous set-json /minio-policy.json local/blog
      "
    restart: "no"

  # API Service
  blog-api-service:
    container_name: "blog-api-service"
    image: blog-api-service
    env_file:
      - .env
    depends_on:
      blog-db:
        condition: service_healthy
      blog-redis:
        condition: service_healthy
      blog-minio:
        condition: service_healthy
    build:
      context: .
      dockerfile: ./Dockerfile.dev
    command: ./run.sh
    ports:
      - "8000:8000"
    volumes:
      - .:/opt/blog
    networks:
      - blog-network
    restart: unless-stopped

  # Frontend
  blog-frontend:
    container_name: "blog-frontend"
    image: blog-frontend
    build:
      context: ./frontend
      dockerfile: ./Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - blog-api-service
    networks:
      - blog-network
    restart: unless-stopped

volumes:
  minio_data:
    driver: local
  postgres_data:
    driver: local

networks:
  blog-network:
    external: true
